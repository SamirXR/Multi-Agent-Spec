name: Contract Validation Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  USER_SERVICE_PORT: 3001
  TASK_SERVICE_PORT: 3002
  NOTIFICATION_SERVICE_PORT: 3003
  ANALYTICS_SERVICE_PORT: 3004

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Validate specs (lint) and validate external examples against specs
  # ─────────────────────────────────────────────────────────────────────────────
  validate-specs:
    name: Validate Specs & External Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (required for Specmatic)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Save Specmatic Enterprise license
        env:
          SPECMATIC_LICENSE: ${{ secrets.SPECMATIC_LICENSE }}
        run: |
          mkdir -p ~/.specmatic
          if [ -n "$SPECMATIC_LICENSE" ]; then
            echo "$SPECMATIC_LICENSE" > ~/.specmatic/specmatic-license.txt
            echo "Enterprise license installed."
          else
            echo "No SPECMATIC_LICENSE secret — running in OSS mode."
          fi

      - name: Validate OpenAPI contracts (Redocly lint)
        run: |
          npx @redocly/cli lint contracts/user-service.yaml
          npx @redocly/cli lint contracts/task-service.yaml
          npx @redocly/cli lint contracts/notification-service.yaml
          npx @redocly/cli lint contracts/analytics-service.yaml

      - name: Validate external examples against specs (Specmatic)
        run: |
          npx specmatic examples validate --spec-file contracts/user-service.yaml
          npx specmatic examples validate --spec-file contracts/task-service.yaml
          npx specmatic examples validate --spec-file contracts/notification-service.yaml
          npx specmatic examples validate --spec-file contracts/analytics-service.yaml

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Start microservices and run Specmatic contract + resiliency tests
  # Uses specmatic/enterprise Docker image per Specmatic CI docs:
  #   https://docs.specmatic.io/references/continuous_integration
  # ─────────────────────────────────────────────────────────────────────────────
  contract-tests:
    name: Run Specmatic Contract & Resiliency Tests
    runs-on: ubuntu-latest
    needs: validate-specs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Save Specmatic Enterprise license
        env:
          SPECMATIC_LICENSE: ${{ secrets.SPECMATIC_LICENSE }}
        run: |
          mkdir -p ~/.specmatic
          if [ -n "$SPECMATIC_LICENSE" ]; then
            echo "$SPECMATIC_LICENSE" > ~/.specmatic/specmatic-license.txt
            echo "Enterprise license installed."
          else
            echo "No SPECMATIC_LICENSE secret — running in OSS mode (resiliency tests will be skipped)."
          fi

      - name: Start all microservices
        run: |
          npm run start:user-service &
          npm run start:task-service &
          npm run start:notification-service &
          USER_SERVICE_URL=http://localhost:${{ env.USER_SERVICE_PORT }} \
          TASK_SERVICE_URL=http://localhost:${{ env.TASK_SERVICE_PORT }} \
          NOTIFICATION_SERVICE_URL=http://localhost:${{ env.NOTIFICATION_SERVICE_PORT }} \
          npm run start:analytics-service &

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to start..."
          for port in ${{ env.USER_SERVICE_PORT }} ${{ env.TASK_SERVICE_PORT }} ${{ env.NOTIFICATION_SERVICE_PORT }} ${{ env.ANALYTICS_SERVICE_PORT }}; do
            echo "  Checking port $port..."
            for i in $(seq 1 60); do
              if curl -sf http://localhost:$port/health > /dev/null 2>&1; then
                echo "  Service on port $port is ready"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "  ERROR: Service on port $port failed to start after 60 seconds"
                curl -v http://localhost:$port/health 2>&1 || true
                exit 1
              fi
              sleep 1
            done
          done
          echo "All services are ready!"

      # --- User Service ---
      - name: Run Specmatic contract tests — User Service
        run: |
          mkdir -p reports/user-service/contract reports/user-service/resiliency
          docker run --rm \
            -v "$(pwd):/usr/src/app" \
            -v "$HOME/.specmatic:/root/.specmatic:ro" \
            -w /usr/src/app \
            --network host \
            specmatic/enterprise \
            test contracts/user-service.yaml \
            --testBaseURL=http://localhost:${{ env.USER_SERVICE_PORT }} \
            --junitReportDir=reports/user-service/contract

      # --- Task Service ---
      - name: Run Specmatic contract tests — Task Service
        run: |
          mkdir -p reports/task-service/contract reports/task-service/resiliency
          docker run --rm \
            -v "$(pwd):/usr/src/app" \
            -v "$HOME/.specmatic:/root/.specmatic:ro" \
            -w /usr/src/app \
            --network host \
            specmatic/enterprise \
            test contracts/task-service.yaml \
            --testBaseURL=http://localhost:${{ env.TASK_SERVICE_PORT }} \
            --junitReportDir=reports/task-service/contract

      # --- Notification Service ---
      - name: Run Specmatic contract tests — Notification Service
        run: |
          mkdir -p reports/notification-service/contract reports/notification-service/resiliency
          docker run --rm \
            -v "$(pwd):/usr/src/app" \
            -v "$HOME/.specmatic:/root/.specmatic:ro" \
            -w /usr/src/app \
            --network host \
            specmatic/enterprise \
            test contracts/notification-service.yaml \
            --testBaseURL=http://localhost:${{ env.NOTIFICATION_SERVICE_PORT }} \
            --junitReportDir=reports/notification-service/contract

      # --- Analytics Service ---
      - name: Run Specmatic contract tests — Analytics Service
        run: |
          mkdir -p reports/analytics-service/contract reports/analytics-service/resiliency
          docker run --rm \
            -v "$(pwd):/usr/src/app" \
            -v "$HOME/.specmatic:/root/.specmatic:ro" \
            -w /usr/src/app \
            --network host \
            specmatic/enterprise \
            test contracts/analytics-service.yaml \
            --testBaseURL=http://localhost:${{ env.ANALYTICS_SERVICE_PORT }} \
            --junitReportDir=reports/analytics-service/contract

      # --- Split CTRF reports into contract vs resiliency ---
      - name: Separate contract and resiliency CTRF reports
        if: always()
        run: |
          pip install jsonpath-ng 2>/dev/null || true
          python3 << 'PYEOF'
          import json, os, glob

          for svc in ["user-service", "task-service", "notification-service", "analytics-service"]:
            ctrf_dir = f"build/reports/specmatic/test/ctrf"
            for ctrf_file in glob.glob(f"{ctrf_dir}/*.json"):
              try:
                with open(ctrf_file) as f:
                  report = json.load(f)
              except:
                continue

              contract_tests = []
              resiliency_tests = []

              for test in report.get("tests", []):
                name = test.get("name", "")
                # Resiliency tests are generative negative tests
                # They typically involve type mutations, null values, missing fields
                # and their names don't come from user-defined examples
                tags = test.get("tags", [])
                is_resiliency = any("resiliency" in str(t).lower() for t in tags)

                # Heuristic: tests with example names (from _examples/ dir or inline)
                # are contract tests; auto-generated negative tests are resiliency
                example_keywords = ["create_user_success", "list_users", "get_user_by_id",
                                    "get_user_not_found", "create_user_missing_fields",
                                    "create_task_success", "list_tasks", "list_tasks_by_status",
                                    "create_task_missing_fields", "create_notification_success",
                                    "list_notifications", "list_notifications_by_user",
                                    "create_notification_missing_fields", "get_analytics",
                                    "get_analytics_with_date_range", "CREATE_USER", "USERS_LIST",
                                    "USER_DETAIL", "NOT_FOUND", "CREATE_TASK", "TASKS_LIST",
                                    "CREATE_NOTIFICATION", "NOTIFICATIONS_LIST", "ANALYTICS_DATA"]

                is_example_based = any(kw in name for kw in example_keywords)

                if is_resiliency or (not is_example_based and "400" in name):
                  resiliency_tests.append(test)
                else:
                  contract_tests.append(test)

              # Write separate CTRF reports
              contract_report = {**report, "tests": contract_tests, "summary": {"tests": len(contract_tests), "passed": sum(1 for t in contract_tests if t.get("status") == "passed"), "failed": sum(1 for t in contract_tests if t.get("status") == "failed"), "skipped": sum(1 for t in contract_tests if t.get("status") == "skipped")}}
              resiliency_report = {**report, "tests": resiliency_tests, "summary": {"tests": len(resiliency_tests), "passed": sum(1 for t in resiliency_tests if t.get("status") == "passed"), "failed": sum(1 for t in resiliency_tests if t.get("status") == "failed"), "skipped": sum(1 for t in resiliency_tests if t.get("status") == "skipped")}}

              os.makedirs(f"reports/{svc}/contract/ctrf", exist_ok=True)
              os.makedirs(f"reports/{svc}/resiliency/ctrf", exist_ok=True)

              with open(f"reports/{svc}/contract/ctrf/ctrf-report.json", "w") as f:
                json.dump(contract_report, f, indent=2)
              with open(f"reports/{svc}/resiliency/ctrf/ctrf-report.json", "w") as f:
                json.dump(resiliency_report, f, indent=2)

              print(f"{svc}: {len(contract_tests)} contract, {len(resiliency_tests)} resiliency tests")
              break  # Only process first CTRF file per service run
          PYEOF

      - name: Upload all Specmatic reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: specmatic-reports
          path: |
            reports/
            build/reports/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build the research dashboard
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build dashboard
        run: npm run build -w dashboard

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Generate pipeline summary
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Generate Validation Report
    runs-on: ubuntu-latest
    needs: [validate-specs, contract-tests, build]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Specmatic reports
        uses: actions/download-artifact@v4
        with:
          name: specmatic-reports
          path: ./reports
        continue-on-error: true

      - name: Generate GitHub Actions summary
        run: |
          echo "## Contract Validation Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Spec Validation & External Examples | ${{ needs.validate-specs.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract & Resiliency Tests | ${{ needs.contract-tests.result == 'success' && 'Passed' || needs.contract-tests.result == 'skipped' && 'Skipped' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard Build | ${{ needs.build.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verified Contracts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Contract Spec | External Examples |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------------|-------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| User Service | \`user-service.yaml\` | \`user-service_examples/\` (5 files) |" >> $GITHUB_STEP_SUMMARY
          echo "| Task Service | \`task-service.yaml\` | \`task-service_examples/\` (4 files) |" >> $GITHUB_STEP_SUMMARY
          echo "| Notification Service | \`notification-service.yaml\` | \`notification-service_examples/\` (4 files) |" >> $GITHUB_STEP_SUMMARY
          echo "| Analytics Service | \`analytics-service.yaml\` | \`analytics-service_examples/\` (2 files) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Specmatic Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Specmatic Version**: Enterprise (Docker \`specmatic/enterprise\`)" >> $GITHUB_STEP_SUMMARY
          echo "- **Resiliency Tests**: Enabled via Enterprise license" >> $GITHUB_STEP_SUMMARY
          echo "- **External Examples**: Validated before contract tests run (15 files across 4 services)" >> $GITHUB_STEP_SUMMARY
          echo "- **License**: Enterprise license via GitHub Secret (\`SPECMATIC_LICENSE\`) → \`~/.specmatic/specmatic-license.txt\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Reports**: Separate CTRF reports per service for contract and resiliency tests" >> $GITHUB_STEP_SUMMARY