name: Contract Validation Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Validate specs (lint) and validate external examples against specs
  # ─────────────────────────────────────────────────────────────────────────────
  validate-specs:
    name: Validate Specs & External Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (required for Specmatic)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Validate OpenAPI contracts (Redocly lint)
        run: |
          npx @redocly/cli lint contracts/user-service.yaml --skip-rule=no-unused-components
          npx @redocly/cli lint contracts/task-service.yaml --skip-rule=no-unused-components
          npx @redocly/cli lint contracts/notification-service.yaml --skip-rule=no-unused-components
          npx @redocly/cli lint contracts/analytics-service.yaml --skip-rule=no-unused-components

      - name: Validate external examples against specs (Specmatic)
        run: |
          npx specmatic examples validate --spec-file contracts/user-service.yaml
          npx specmatic examples validate --spec-file contracts/task-service.yaml
          npx specmatic examples validate --spec-file contracts/notification-service.yaml
          npx specmatic examples validate --spec-file contracts/analytics-service.yaml

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Start microservices and run Specmatic contract + resiliency tests
  # ─────────────────────────────────────────────────────────────────────────────
  contract-tests:
    name: Run Specmatic Contract & Resiliency Tests
    runs-on: ubuntu-latest
    needs: validate-specs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (required for Specmatic)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Start User Service (port 3001)
        run: npm run start:user-service &

      - name: Start Task Service (port 3002)
        run: npm run start:task-service &

      - name: Start Notification Service (port 3003)
        run: npm run start:notification-service &

      - name: Start Analytics Service (port 3004)
        run: npm run start:analytics-service &

      - name: Wait for all services to be healthy
        run: |
          echo "⏳ Waiting for services to start..."
          for port in 3001 3002 3003 3004; do
            echo "Waiting for service on port $port..."
            for i in $(seq 1 40); do
              if curl -sf http://localhost:$port/health > /dev/null 2>&1; then
                echo "✅ Service on port $port is ready"
                break
              fi
              if [ $i -eq 40 ]; then
                echo "❌ Service on port $port failed to start after 40 seconds"
                exit 1
              fi
              sleep 1
            done
          done
          echo "✅ All services are ready!"

      - name: Run Specmatic contract tests — User Service
        run: npx specmatic test contracts/user-service.yaml --testBaseURL=http://localhost:3001

      - name: Run Specmatic contract tests — Task Service (+ resiliency)
        run: npx specmatic test contracts/task-service.yaml --testBaseURL=http://localhost:3002

      - name: Run Specmatic contract tests — Notification Service
        run: npx specmatic test contracts/notification-service.yaml --testBaseURL=http://localhost:3003

      - name: Run Specmatic contract tests — Analytics Service
        run: npx specmatic test contracts/analytics-service.yaml --testBaseURL=http://localhost:3004

      - name: Upload Specmatic test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: specmatic-reports
          path: build/reports/specmatic/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build the research dashboard
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build dashboard
        run: npm run build -w dashboard

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Generate pipeline summary
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Generate Validation Report
    runs-on: ubuntu-latest
    needs: [validate-specs, contract-tests, build]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Specmatic reports
        uses: actions/download-artifact@v4
        with:
          name: specmatic-reports
          path: ./reports
        continue-on-error: true

      - name: Generate GitHub Actions summary
        run: |
          echo "## 📊 Contract Validation Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Spec Validation & External Examples | ${{ needs.validate-specs.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Contract & Resiliency Tests | ${{ needs.contract-tests.result == 'success' && '✅ Passed' || needs.contract-tests.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Dashboard Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verified Contracts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Contract Spec | External Examples |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------------|-------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| User Service | \`user-service.yaml\` | \`user-service_examples/\` (5 files) |" >> $GITHUB_STEP_SUMMARY
          echo "| Task Service | \`task-service.yaml\` | \`task-service_examples/\` (4 files) |" >> $GITHUB_STEP_SUMMARY
          echo "| Notification Service | \`notification-service.yaml\` | \`notification-service_examples/\` (4 files) |" >> $GITHUB_STEP_SUMMARY
          echo "| Analytics Service | \`analytics-service.yaml\` | \`analytics-service_examples/\` (2 files) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Specmatic Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Resiliency Tests**: Enabled for Task Service (\`resiliencyTests: all\`)" >> $GITHUB_STEP_SUMMARY
          echo "- **Specmatic Version**: v2.47.0" >> $GITHUB_STEP_SUMMARY
          echo "- **External Examples**: Validated before contract tests run" >> $GITHUB_STEP_SUMMARY
