name: Contract Validation Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  USER_SERVICE_PORT: 3001
  TASK_SERVICE_PORT: 3002
  NOTIFICATION_SERVICE_PORT: 3003
  ANALYTICS_SERVICE_PORT: 3004

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Validate specs (lint) and validate external examples against specs
  # ─────────────────────────────────────────────────────────────────────────────
  validate-specs:
    name: Validate Specs & External Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (required for Specmatic OSS CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Validate OpenAPI contracts (Redocly lint)
        run: |
          npx @redocly/cli lint contracts/user-service.yaml
          npx @redocly/cli lint contracts/task-service.yaml
          npx @redocly/cli lint contracts/notification-service.yaml
          npx @redocly/cli lint contracts/analytics-service.yaml

      - name: Validate external examples against specs (Specmatic)
        run: |
          npx specmatic examples validate --spec-file contracts/user-service.yaml
          npx specmatic examples validate --spec-file contracts/task-service.yaml
          npx specmatic examples validate --spec-file contracts/notification-service.yaml
          npx specmatic examples validate --spec-file contracts/analytics-service.yaml

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Start microservices and run Specmatic contract + resiliency tests
  #
  # Uses specmatic/enterprise Docker image per Specmatic CI docs:
  #   https://docs.specmatic.io/references/continuous_integration
  #
  # The Enterprise image automatically runs BOTH contract tests AND resiliency
  # tests (schema-based negative tests) when a valid license is present.
  # No --resiliency CLI flag is needed or supported.
  #
  # Reports are saved per-service under specmatic-reports/ and committed
  # back to the repository so they are available for review.
  # ─────────────────────────────────────────────────────────────────────────────
  contract-tests:
    name: Run Specmatic Contract & Resiliency Tests
    runs-on: ubuntu-latest
    needs: validate-specs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Write the Enterprise license so the Docker container can pick it up
      - name: Save Specmatic Enterprise license
        env:
          SPECMATIC_LICENSE: ${{ secrets.SPECMATIC_LICENSE }}
        run: |
          mkdir -p ~/.specmatic
          if [ -n "$SPECMATIC_LICENSE" ]; then
            echo "$SPECMATIC_LICENSE" > ~/.specmatic/specmatic-license.txt
            echo "Enterprise license installed."
          else
            echo "WARNING: No SPECMATIC_LICENSE secret found."
            echo "Resiliency tests require a Specmatic Enterprise license."
          fi

      # ── Start microservices ─────────────────────────────────────────────────
      - name: Start all microservices
        run: |
          npm run start:user-service &
          npm run start:task-service &
          npm run start:notification-service &
          USER_SERVICE_URL=http://localhost:${{ env.USER_SERVICE_PORT }} \
          TASK_SERVICE_URL=http://localhost:${{ env.TASK_SERVICE_PORT }} \
          NOTIFICATION_SERVICE_URL=http://localhost:${{ env.NOTIFICATION_SERVICE_PORT }} \
          npm run start:analytics-service &

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to start..."
          for port in ${{ env.USER_SERVICE_PORT }} ${{ env.TASK_SERVICE_PORT }} \
                      ${{ env.NOTIFICATION_SERVICE_PORT }} ${{ env.ANALYTICS_SERVICE_PORT }}; do
            echo "  Checking port $port..."
            for i in $(seq 1 60); do
              if curl -sf http://localhost:$port/health > /dev/null 2>&1; then
                echo "  Service on port $port is ready"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "  ERROR: Service on port $port failed to start after 60 seconds"
                exit 1
              fi
              sleep 1
            done
          done
          echo "All services are ready!"

      # ── Pull Enterprise image once ──────────────────────────────────────────
      - name: Pull Specmatic Enterprise Docker image
        run: docker pull specmatic/enterprise

      # ── Run tests per service ────────────────────────────────────────────────
      # Each service runs in its own Docker container.
      # Reports are mounted to a service-specific directory so they don't overwrite
      # each other.  The Enterprise image generates:
      #   - JUnit XML: build/reports/specmatic/test/junit/
      #   - CTRF JSON: build/reports/specmatic/test/ctrf/
      #   - HTML:      build/reports/specmatic/test/html/
      # Inside the container these are at /usr/src/app/build/reports/specmatic/,
      # which we map to specmatic-reports/<service>/ on the host.

      - name: Run tests — User Service (contract + resiliency)
        run: |
          mkdir -p specmatic-reports/user-service
          docker run --rm \
            -v "$(pwd)/contracts:/usr/src/app/contracts" \
            -v "$(pwd)/specmatic.json:/usr/src/app/specmatic.json" \
            -v "$(pwd)/specmatic-reports/user-service:/usr/src/app/build/reports/specmatic" \
            -v "$HOME/.specmatic:/root/.specmatic:ro" \
            -w /usr/src/app \
            --network host \
            specmatic/enterprise \
            test contracts/user-service.yaml \
            --testBaseURL=http://localhost:${{ env.USER_SERVICE_PORT }}

      - name: Run tests — Task Service (contract + resiliency)
        run: |
          mkdir -p specmatic-reports/task-service
          docker run --rm \
            -v "$(pwd)/contracts:/usr/src/app/contracts" \
            -v "$(pwd)/specmatic.json:/usr/src/app/specmatic.json" \
            -v "$(pwd)/specmatic-reports/task-service:/usr/src/app/build/reports/specmatic" \
            -v "$HOME/.specmatic:/root/.specmatic:ro" \
            -w /usr/src/app \
            --network host \
            specmatic/enterprise \
            test contracts/task-service.yaml \
            --testBaseURL=http://localhost:${{ env.TASK_SERVICE_PORT }}

      - name: Run tests — Notification Service (contract + resiliency)
        run: |
          mkdir -p specmatic-reports/notification-service
          docker run --rm \
            -v "$(pwd)/contracts:/usr/src/app/contracts" \
            -v "$(pwd)/specmatic.json:/usr/src/app/specmatic.json" \
            -v "$(pwd)/specmatic-reports/notification-service:/usr/src/app/build/reports/specmatic" \
            -v "$HOME/.specmatic:/root/.specmatic:ro" \
            -w /usr/src/app \
            --network host \
            specmatic/enterprise \
            test contracts/notification-service.yaml \
            --testBaseURL=http://localhost:${{ env.NOTIFICATION_SERVICE_PORT }}

      - name: Run tests — Analytics Service (contract + resiliency)
        run: |
          mkdir -p specmatic-reports/analytics-service
          docker run --rm \
            -v "$(pwd)/contracts:/usr/src/app/contracts" \
            -v "$(pwd)/specmatic.json:/usr/src/app/specmatic.json" \
            -v "$(pwd)/specmatic-reports/analytics-service:/usr/src/app/build/reports/specmatic" \
            -v "$HOME/.specmatic:/root/.specmatic:ro" \
            -w /usr/src/app \
            --network host \
            specmatic/enterprise \
            test contracts/analytics-service.yaml \
            --testBaseURL=http://localhost:${{ env.ANALYTICS_SERVICE_PORT }}

      # ── Split CTRF reports into contract vs resiliency ─────────────────────
      - name: Split CTRF reports into contract and resiliency
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os, glob, shutil

          for svc in ["user-service", "task-service", "notification-service", "analytics-service"]:
              ctrf_dir = f"specmatic-reports/{svc}/test/ctrf"
              ctrf_files = glob.glob(f"{ctrf_dir}/*.json")
              if not ctrf_files:
                  print(f"{svc}: No CTRF report found at {ctrf_dir}")
                  # Print directory tree for debugging
                  base = f"specmatic-reports/{svc}"
                  for root, dirs, files in os.walk(base):
                      level = root.replace(base, "").count(os.sep)
                      indent = "  " * level
                      print(f"{indent}{os.path.basename(root)}/")
                      sub_indent = "  " * (level + 1)
                      for f in files:
                          print(f"{sub_indent}{f}")
                  continue

              for ctrf_file in ctrf_files:
                  try:
                      with open(ctrf_file) as f:
                          report = json.load(f)
                  except Exception as e:
                      print(f"{svc}: Failed to read CTRF: {e}")
                      continue

                  # CTRF from Specmatic wraps data under "results"
                  results = report.get("results", report)
                  all_tests = results.get("tests", [])
                  original_summary = results.get("summary", {})
                  contract_tests = []
                  resiliency_tests = []

                  for test in all_tests:
                      name = test.get("name", "")
                      tags = test.get("tags", [])
                      test_type = test.get("type", "")

                      # Resiliency tests use type "ResiliencyTest" or have resiliency tags
                      is_resiliency = (
                          test_type == "ResiliencyTest" or
                          "resiliency" in test_type.lower() or
                          any("resiliency" in str(t).lower() for t in tags) or
                          "RESILIENCY" in name.upper()
                      )

                      if is_resiliency:
                          resiliency_tests.append(test)
                      else:
                          contract_tests.append(test)

                  def make_report(tests, original_results):
                      r = original_results.copy() if isinstance(original_results, dict) else {}
                      r["tests"] = tests
                      r["summary"] = {
                          "tests": len(tests),
                          "passed": sum(1 for t in tests if t.get("status") == "passed"),
                          "failed": sum(1 for t in tests if t.get("status") == "failed"),
                          "skipped": sum(1 for t in tests if t.get("status") == "skipped"),
                          "pending": sum(1 for t in tests if t.get("status") == "pending"),
                          "other": sum(1 for t in tests if t.get("status") not in ("passed", "failed", "skipped", "pending"))
                      }
                      return r

                  for test_type, tests in [("contract", contract_tests), ("resiliency", resiliency_tests)]:
                      out_dir = f"specmatic-reports/{svc}/{test_type}/ctrf"
                      os.makedirs(out_dir, exist_ok=True)
                      out_path = f"{out_dir}/ctrf-report.json"
                      with open(out_path, "w") as f:
                          json.dump(make_report(tests, results), f, indent=2)

                  # Copy HTML report to both sub-directories for easy browsing
                  html_src = f"specmatic-reports/{svc}/test/html"
                  if os.path.isdir(html_src):
                      for dest_base in ["contract", "resiliency"]:
                          html_dest = f"specmatic-reports/{svc}/{dest_base}/html"
                          if os.path.exists(html_dest):
                              shutil.rmtree(html_dest)
                          shutil.copytree(html_src, html_dest)

                  print(f"{svc}: {len(contract_tests)} contract, {len(resiliency_tests)} resiliency tests")

          PYEOF

      # ── Commit reports to the repository ────────────────────────────────────
      - name: Commit test reports to repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add specmatic-reports/
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: update Specmatic contract and resiliency test reports [skip ci]"
            git push
          fi

      # ── Also upload as artifact for easy download ───────────────────────────
      - name: Upload Specmatic reports artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: specmatic-reports
          path: specmatic-reports/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build the research dashboard
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build dashboard
        run: npm run build -w dashboard

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Generate pipeline summary
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Generate Validation Report
    runs-on: ubuntu-latest
    needs: [validate-specs, contract-tests, build]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Specmatic reports artifact
        uses: actions/download-artifact@v4
        with:
          name: specmatic-reports
          path: ./specmatic-reports
        continue-on-error: true

      - name: Generate GitHub Actions summary
        run: |
          echo "## Contract Validation Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Spec Validation & External Examples | ${{ needs.validate-specs.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract & Resiliency Tests | ${{ needs.contract-tests.result == 'success' && 'Passed' || needs.contract-tests.result == 'skipped' && 'Skipped' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard Build | ${{ needs.build.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verified Contracts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Contract Spec | External Examples |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------------|-------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| User Service | \`user-service.yaml\` | \`user-service_examples/\` (5 files) |" >> $GITHUB_STEP_SUMMARY
          echo "| Task Service | \`task-service.yaml\` | \`task-service_examples/\` (4 files) |" >> $GITHUB_STEP_SUMMARY
          echo "| Notification Service | \`notification-service.yaml\` | \`notification-service_examples/\` (4 files) |" >> $GITHUB_STEP_SUMMARY
          echo "| Analytics Service | \`analytics-service.yaml\` | \`analytics-service_examples/\` (2 files) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reports are saved per service under \`specmatic-reports/\` with separate" >> $GITHUB_STEP_SUMMARY
          echo "contract and resiliency CTRF + HTML reports:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "specmatic-reports/" >> $GITHUB_STEP_SUMMARY
          echo "  user-service/       # Contract + resiliency reports" >> $GITHUB_STEP_SUMMARY
          echo "    test/             # Combined reports (Enterprise default)" >> $GITHUB_STEP_SUMMARY
          echo "    contract/         # Contract-only CTRF + HTML" >> $GITHUB_STEP_SUMMARY
          echo "    resiliency/       # Resiliency-only CTRF + HTML" >> $GITHUB_STEP_SUMMARY
          echo "  task-service/" >> $GITHUB_STEP_SUMMARY
          echo "  notification-service/" >> $GITHUB_STEP_SUMMARY
          echo "  analytics-service/" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Specmatic Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Specmatic Version**: Enterprise (Docker \`specmatic/enterprise\`)" >> $GITHUB_STEP_SUMMARY
          echo "- **Resiliency Tests**: Automatically enabled with Enterprise license" >> $GITHUB_STEP_SUMMARY
          echo "- **External Examples**: Validated before contract tests (15 files across 4 services)" >> $GITHUB_STEP_SUMMARY
          echo "- **License**: Via GitHub Secret \`SPECMATIC_LICENSE\` -> \`~/.specmatic/specmatic-license.txt\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Reports**: Separate CTRF + HTML reports per service for contract and resiliency tests" >> $GITHUB_STEP_SUMMARY