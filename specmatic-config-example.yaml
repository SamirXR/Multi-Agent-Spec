# Specmatic v3 Configuration — REFERENCE ONLY
# =============================================
# This file is named specmatic-config-example.yaml (not specmatic.yaml) to prevent
# Specmatic from auto-loading it during `specmatic test --spec-file ... --testBaseURL ...`
# CLI invocations used in CI and npm scripts.
#
# The v3 config's automatic SUT/dependency management (starting mocks, binding ports)
# conflicts with v2-style CLI args that explicitly specify --testBaseURL.
#
# To USE this config with `specmatic test` (no extra args), rename it to specmatic.yaml.
# To use v2-style CLI (recommended for CI), keep this name and use:
#   docker run --rm -v "$(pwd):/usr/src/app" --network host specmatic/enterprise \
#     test contracts/X.yaml --testBaseURL=http://localhost:PORT
# The Enterprise Docker image automatically runs resiliency tests when a valid
# license is present. No --resiliency flag is needed or supported.
#
version: 3

# Test the Task Service as the System Under Test (SUT).
# To test other services, change the $ref pointers below.
# For example, to test the user-service instead, change:
#   systemUnderTest.service.$ref -> "#/components/services/userService"
#   systemUnderTest.service.runOptions.$ref -> "#/components/runOptions/userServiceTest"
systemUnderTest:
  service:
    $ref: "#/components/services/taskService"
    runOptions:
      $ref: "#/components/runOptions/taskServiceTest"

dependencies:
  services:
    - service:
        $ref: "#/components/services/userService"
        runOptions:
          $ref: "#/components/runOptions/userServiceMock"
    - service:
        $ref: "#/components/services/notificationService"
        runOptions:
          $ref: "#/components/runOptions/notificationServiceMock"

components:
  sources:
    localContracts:
      filesystem:
        directory: contracts

  services:
    userService:
      description: User Service
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localContracts"
            specs:
              - user-service.yaml
    taskService:
      description: Task Service
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localContracts"
            specs:
              - task-service.yaml
    notificationService:
      description: Notification Service
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localContracts"
            specs:
              - notification-service.yaml
    analyticsService:
      description: Analytics Service
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localContracts"
            specs:
              - analytics-service.yaml

  runOptions:
    userServiceTest:
      openapi:
        type: test
        host: localhost
        port: 3001
    userServiceMock:
      openapi:
        type: mock
        host: localhost
        port: 9001
    taskServiceTest:
      openapi:
        type: test
        host: localhost
        port: 3002
    notificationServiceTest:
      openapi:
        type: test
        host: localhost
        port: 3003
    notificationServiceMock:
      openapi:
        type: mock
        host: localhost
        port: 9003
    analyticsServiceTest:
      openapi:
        type: test
        host: localhost
        port: 3004

specmatic:
  governance:
    successCriteria:
      minCoveragePercentage: 0
      maxMissedOperationsInSpec: 0
      enforce: true
