version: 3

# Test the Task Service as the System Under Test (SUT).
# To test other services, change the $ref pointers below.
# For example, to test the user-service instead, change:
#   systemUnderTest.service.$ref -> "#/components/services/userService"
#   systemUnderTest.service.runOptions.$ref -> "#/components/runOptions/userServiceTest"
systemUnderTest:
  service:
    $ref: "#/components/services/taskService"
    runOptions:
      $ref: "#/components/runOptions/taskServiceTest"

dependencies:
  services:
    - service:
        $ref: "#/components/services/userService"
        runOptions:
          $ref: "#/components/runOptions/userServiceMock"
    - service:
        $ref: "#/components/services/notificationService"
        runOptions:
          $ref: "#/components/runOptions/notificationServiceMock"

components:
  sources:
    localContracts:
      filesystem:
        directory: contracts

  services:
    userService:
      description: User Service
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localContracts"
            specs:
              - user-service.yaml
      settings:
        resiliencyTests: all
    taskService:
      description: Task Service
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localContracts"
            specs:
              - task-service.yaml
      settings:
        resiliencyTests: all
    notificationService:
      description: Notification Service
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localContracts"
            specs:
              - notification-service.yaml
      settings:
        resiliencyTests: all
    analyticsService:
      description: Analytics Service
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localContracts"
            specs:
              - analytics-service.yaml
      settings:
        resiliencyTests: all

  runOptions:
    userServiceTest:
      openapi:
        type: test
        host: localhost
        port: 3001
    userServiceMock:
      openapi:
        type: mock
        host: localhost
        port: 9001
    taskServiceTest:
      openapi:
        type: test
        host: localhost
        port: 3002
    notificationServiceTest:
      openapi:
        type: test
        host: localhost
        port: 3003
    notificationServiceMock:
      openapi:
        type: mock
        host: localhost
        port: 9003
    analyticsServiceTest:
      openapi:
        type: test
        host: localhost
        port: 3004

specmatic:
  governance:
    successCriteria:
      minCoveragePercentage: 0
      maxMissedOperationsInSpec: 0
      enforce: true
